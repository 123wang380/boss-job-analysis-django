<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="/static/css/jquery-ui-1.10.3.custom.min.css">
    <link rel="stylesheet" href="/static/css/entypo.css">
    <link rel="stylesheet" href="/static/css/css.css">
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <link rel="stylesheet" href="/static/css/neon-core.css">
    <link rel="stylesheet" href="/static/css/neon-theme.css">
    <link rel="stylesheet" href="/static/css/neon-forms.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="/static/js/jquery-1.11.0.min.js"></script>
</head>
<body class="page-body login-page login-form-fall">

<div class="login-container">
    <div class="login-header login-caret">
        <div class="login-content">
            <a href="/myApp/home/" class="logo">
                <h2 style="color:#fff;font-weight:bold">基于Selenium的招聘岗位数据采集与可视化分析系统设计</h2>
            </a>
            <p class="description">基于Selenium的招聘岗位数据采集与可视化分析系统设计</p>
            <div class="login-progressbar-indicator">
                <h3>43%</h3>
                <span>logging in...</span>
            </div>
        </div>
    </div>

    <div class="login-progressbar"><div></div></div>

    <div class="login-form">
        <div class="login-content">

            <div class="form-login-error">
                <h3>登录失败</h3>
                <p>请检查用户名和密码是否正确。</p>
            </div>

            <form method="post" action="/myApp/login/" id="form_login">
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-addon"><i class="entypo-user"></i></div>
                        <input type="text" class="form-control" name="username" placeholder="用户名/手机号" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-addon"><i class="entypo-key"></i></div>
                        <input type="password" class="form-control" name="password" placeholder="密码" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-group" style="margin-bottom:5px">
                        <label style="font-weight:normal;cursor:pointer;font-size:13px">
                            <input type="checkbox" id="rememberMe"> 记住账号
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-login">
                        <i class="entypo-login"></i> 登录
                    </button>
                </div>
                <div class="form-group"><em>- 或者 -</em></div>
                <div class="form-group">
                    <a href="/myApp/phoneLogin/" class="btn btn-success btn-lg btn-block btn-icon icon-left">
                        <i class="entypo-mobile"></i> 手机号验证码登录
                    </a>
                </div>
                <div class="form-group">
                    <a href="/myApp/registry/" class="btn btn-default btn-lg btn-block btn-icon icon-left">
                        <i class="entypo-user-add"></i> 注册新用户
                    </a>
                </div>
            </form>

            <div class="login-bottom-links">
                <a href="/myApp/forgotPassword/">忘记密码</a> &nbsp;|&nbsp;
                <a href="/myApp/privacyPolicy/">隐私政策</a> &nbsp;|&nbsp;
                <a href="/myApp/userAgreement/">用户协议</a>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/main-gsap.js"></script>
<script src="/static/js/jquery-ui-1.10.3.minimal.min.js"></script>
<script src="/static/js/bootstrap.js"></script>
<script src="/static/js/joinable.js"></script>
<script src="/static/js/resizeable.js"></script>
<script src="/static/js/neon-api.js"></script>
<script src="/static/js/jquery.validate.min.js"></script>
<script src="/static/js/neon-login.js"></script>
<script src="/static/js/neon-custom.js"></script>
<script src="/static/js/neon-demo.js"></script>
<script>
// 记住账号功能
(function() {
    var userInput = document.getElementsByName('username')[0];
    var pwdInput = document.getElementsByName('password')[0];
    var rememberCb = document.getElementById('rememberMe');

    // 页面加载时读取保存的账号
    var savedUser = localStorage.getItem('remembered_user');
    if (savedUser) {
        userInput.value = savedUser;
        rememberCb.checked = true;
    }

    // 表单提交时保存或清除
    document.getElementById('form_login').addEventListener('submit', function() {
        if (rememberCb.checked && userInput.value.trim()) {
            localStorage.setItem('remembered_user', userInput.value.trim());
        } else {
            localStorage.removeItem('remembered_user');
        }
    });
})();
</script>
</body>
</html>
