<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <link rel="stylesheet" href="/static/css/neon-core.css">
    <link rel="stylesheet" href="/static/css/neon-theme.css">
    <link rel="stylesheet" href="/static/css/neon-forms.css">
    <script src="/static/js/jquery-1.11.0.min.js"></script>
</head>
<body class="page-body login-page">
<div class="login-container">
    <div class="login-header login-caret">
        <div class="login-content">
            <h2 style="color:#fff;font-weight:bold">找回密码</h2>
        </div>
    </div>
    <div class="login-form">
        <div class="login-content">
            <form method="post" action="/myApp/forgotPassword/">
                <div class="form-group">
                    <input type="text" class="form-control" name="phone" placeholder="请输入注册手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <input type="text" class="form-control" name="code" placeholder="验证码（演示：1234）" maxlength="6">
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-info" onclick="sendCode()">获取验证码</button>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" name="newPassword" placeholder="新密码（至少6位）">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">重置密码</button>
                </div>
            </form>
            <div style="text-align:center;margin-top:10px">
                <a href="/myApp/login/">返回登录</a>
            </div>
        </div>
    </div>
</div>
<script>
var cd=0;
function sendCode(){
    if(cd>0)return;
    var p=document.getElementsByName('phone')[0].value;
    if(p.length!=11){alert('请输入正确手机号');return;}
    var b=event.target;b.disabled=true;
    var x=new XMLHttpRequest();
    x.open('POST','/myApp/sendCode/',true);
    x.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    x.onload=function(){var r=JSON.parse(x.responseText);alert(r.success?'验证码:'+r.demo_code:r.msg);};
    x.send('phone='+p);
    cd=60;var t=setInterval(function(){cd--;b.textContent=cd+'s';if(cd<=0){clearInterval(t);b.textContent='获取验证码';b.disabled=false;}},1000);
}
</script>
</body>
</html>
