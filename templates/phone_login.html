<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机号登录</title>
    <link rel="stylesheet" href="/static/css/jquery-ui-1.10.3.custom.min.css">
    <link rel="stylesheet" href="/static/css/entypo.css">
    <link rel="stylesheet" href="/static/css/css.css">
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <link rel="stylesheet" href="/static/css/neon-core.css">
    <link rel="stylesheet" href="/static/css/neon-theme.css">
    <link rel="stylesheet" href="/static/css/neon-forms.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="/static/js/jquery-1.11.0.min.js"></script>
</head>
<body class="page-body login-page login-form-fall">

<div class="login-container">
    <div class="login-header login-caret">
        <div class="login-content">
            <a href="/myApp/home/" class="logo">
                <h2 style="color:#fff;font-weight:bold">基于Selenium的招聘岗位数据采集与可视化分析系统设计</h2>
            </a>
            <p class="description">手机号验证码快捷登录（演示验证码：1234）</p>
        </div>
    </div>

    <div class="login-progressbar"><div></div></div>

    <div class="login-form">
        <div class="login-content">
            <form method="post" action="/myApp/phoneLogin/" id="phoneForm">
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-addon"><i class="entypo-phone"></i></div>
                        <input type="text" class="form-control" name="phone" id="phone" placeholder="请输入11位手机号" maxlength="11" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-addon"><i class="entypo-lock"></i></div>
                        <input type="text" class="form-control" name="code" placeholder="请输入验证码" maxlength="6" autocomplete="off">
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-info" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block btn-login">
                        <i class="entypo-login"></i> 登录 / 注册
                    </button>
                </div>
                <div class="form-group" style="text-align:center">
                    <small class="text-muted">未注册手机号将自动创建账号</small>
                </div>
            </form>
            <div class="login-bottom-links">
                <a href="/myApp/login/">账号密码登录</a> &nbsp;|&nbsp;
                <a href="/myApp/privacyPolicy/">隐私政策</a>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/main-gsap.js"></script>
<script src="/static/js/jquery-ui-1.10.3.minimal.min.js"></script>
<script src="/static/js/bootstrap.js"></script>
<script src="/static/js/joinable.js"></script>
<script src="/static/js/resizeable.js"></script>
<script src="/static/js/neon-api.js"></script>
<script src="/static/js/neon-custom.js"></script>
<script src="/static/js/neon-demo.js"></script>
<script>
var countdown = 0;
function sendCode() {
    if (countdown > 0) return;
    var phone = document.getElementById('phone').value;
    if (phone.length != 11) { alert('请输入正确的11位手机号'); return; }
    var btn = document.getElementById('sendCodeBtn');
    btn.disabled = true;
    // 发送请求
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/myApp/sendCode/', true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onload = function() {
        var res = JSON.parse(xhr.responseText);
        if (res.success && res.demo_code) {
            alert('验证码已发送（演示验证码：' + res.demo_code + '）');
        } else {
            alert(res.msg || '发送失败');
            btn.disabled = false;
            return;
        }
    };
    xhr.send('phone=' + phone);
    countdown = 60;
    var timer = setInterval(function() {
        countdown--;
        btn.textContent = countdown + 's后重发';
        if (countdown <= 0) {
            clearInterval(timer);
            btn.textContent = '获取验证码';
            btn.disabled = false;
        }
    }, 1000);
}
</script>
</body>
</html>
