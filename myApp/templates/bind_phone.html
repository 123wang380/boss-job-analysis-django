<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>绑定手机号</title>
<link rel="stylesheet" href="/static/css/bootstrap.css"><link rel="stylesheet" href="/static/css/neon-core.css"><link rel="stylesheet" href="/static/css/neon-theme.css"><link rel="stylesheet" href="/static/css/neon-forms.css"><link rel="stylesheet" href="/static/css/entypo.css">
<script src="/static/js/jquery-1.11.0.min.js"></script>
</head>
<body class="page-body page-left-in">
<div class="page-container">
<div class="sidebar-menu"><header class="logo-env"><div class="logo"><h3 style="color:#fff;font-weight:bold;margin-top:5px">基于Selenium的招聘岗位数据采集与可视化分析系统设计</h3></div></header>
<ul class="main-menu"><li><a href="/myApp/home/"><i class="entypo-gauge"></i><span>系统首页</span></a></li><li><a href="/myApp/accountSecurity/"><i class="entypo-shield"></i><span>账号安全</span></a></li></ul></div>
<div class="main-content"><div class="row"><div class="col-md-6 col-md-offset-3">
<h3>绑定/修改手机号</h3><hr>
<div class="panel panel-default"><div class="panel-body">
<form method="post" action="/myApp/bindPhone/">
<div class="form-group"><label>新手机号</label><input type="text" class="form-control" name="phone" placeholder="11位手机号" maxlength="11" value="{{ userInfo.phone }}"></div>
<div class="form-group"><label>验证码（演示：1234）</label>
<div class="input-group"><input type="text" class="form-control" name="code" placeholder="验证码" maxlength="6"><span class="input-group-btn"><button type="button" class="btn btn-info" onclick="sendCode()">获取验证码</button></span></div></div>
<button type="submit" class="btn btn-primary">确认绑定</button>
<a href="/myApp/accountSecurity/" class="btn btn-default">返回</a>
</form></div></div></div></div>
<footer class="main-footer"><div class="footer-inner"><div class="footer-text">Copyright &copy; 2026.基于Selenium的招聘岗位数据采集与可视化分析系统设计.</div></div></footer>
</div></div>
<script src="/static/js/main-gsap.js"></script><script src="/static/js/jquery-ui-1.10.3.minimal.min.js"></script><script src="/static/js/bootstrap.js"></script><script src="/static/js/joinable.js"></script><script src="/static/js/resizeable.js"></script><script src="/static/js/neon-api.js"></script><script src="/static/js/neon-custom.js"></script><script src="/static/js/neon-demo.js"></script>
<script>
var cd=0;
function sendCode(){
    if(cd>0)return;
    var p=document.getElementsByName('phone')[0].value;
    if(p.length!=11){alert('请输入正确手机号');return;}
    var b=event.target;b.disabled=true;
    var x=new XMLHttpRequest();
    x.open('POST','/myApp/sendCode/',true);
    x.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    x.onload=function(){var r=JSON.parse(x.responseText);alert(r.success?'验证码:'+r.demo_code:r.msg);};
    x.send('phone='+p);
    cd=60;var t=setInterval(function(){cd--;b.textContent=cd+'s';if(cd<=0){clearInterval(t);b.textContent='获取验证码';b.disabled=false;}},1000);
}
</script>
</body></html>
